site_name: Learn Oravia
site_description: Master Oravia through spaced repetition and interactive learning
site_author: Aline

theme:
  name: material
  language: en

  palette:
    scheme: default
    primary: light blue
    accent: amber
  
  font:
    text: Lora
    code: Source Code Pro
  
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tooltips

nav:
  - Home: index.md
  - About:
    - What is Oravia?: about/what-is-oravia.md
    - Core Grammar: about/core-grammar.md
    - Advanced Grammar: about/advanced-grammar.md
    - About Me: about/about-me.md
  - Course:
    - L0 - Pronunciation & Structure: course/lesson00.md
    - Core:
      - L1 - Pronouns / MO Cluster: course/lesson01.md
      - L2 - Markers: course/lesson02.md
      - L3 - FA Cluster: course/lesson03.md
      - L4 - Negation / Gender: course/lesson04.md
      - L5 - BO Cluster: course/lesson05.md
      - L6 - Questions: course/lesson06.md
      - L7 - AN Cluster: course/lesson07.md
      - L8 - Possessives: course/lesson08.md
      - L9 - YA Cluster: course/lesson09.md
      - L10 - u Marker: course/lesson10.md
      - L11 - IL Cluster: course/lesson11.md
      - L12 - Is/Are: course/lesson12.md
      - L13 - EO Cluster: course/lesson13.md
      - L14 - Connectors: course/lesson14.md
      - L15 - Numbers: course/lesson15.md
      - L16 - Exist and Like / GE: course/lesson16.md
      - L17 - LI Cluster: course/lesson17.md
      - L18 - CA Connector: course/lesson18.md
      - L19 - OI Cluster: course/lesson19.md
      - L20 - AR and IS / BE Cluster: course/lesson20.md
      - Milestone: course/milestone1.md
    - Fluency:
      - L21 - VA Cluster: course/lesson21.md
      - L22 - Time Units: course/lesson22.md
      - L23 - NO Cluster: course/lesson23.md
      - L24 - Hai & Hue: course/lesson24.md
      - L25 - YU Cluster: course/lesson25.md
      - L26 - Sequences: course/lesson26.md
      - L27 - TO Cluster: course/lesson27.md
      - L28 - Why & How: course/lesson28.md
      - L29 - LU Cluster: course/lesson29.md
      - L30 - Comparatives: course/lesson30.md
      - L31 - APA Cluster: course/lesson31.md
      - L32 - Should & Must / RO Cluster: course/lesson32.md
      - L33 - MI Cluster: course/lesson33.md
      - L34 - Conditionals: course/lesson34.md
      - L35 - YE Cluster: course/lesson35.md
      - L36 - Each Other & Self / Habit: course/lesson36.md
      - L37 - NE Cluster: course/lesson37.md
      - L38 - Relative Time / YO Cluster: course/lesson38.md
      - L39 - LE Cluster: course/lesson39.md
      - L40 - Gradation: course/lesson40.md
      - Milestone 2: course/milestone2.md
  - Worldbuilding:
      - Script: world/script.md

markdown_extensions:
  - attr_list
  - md_in_html
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - def_list
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: en

extra:
  version:
    provider: mike
  cache_buster: true  # Add this line
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/yourusername/oravia-learn
      name: GitHub Repository
  generator: false

copyright: Copyright &copy; 2025 Learn Oravia

extra_css:
  - css/custom.css

extra_javascript:
  - js/matching-game.js
